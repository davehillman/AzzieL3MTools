// following is a single point AJAX call

function ajrun(urlcall, typecall, params,outfun) { 
    $.ajax({
        type: typecall,
        url:  urlcall,
        data: params,
        async: true,
        success: function(data){
          results = JSON.parse(data)
          if (outfun != "") outfun(results)
          },
        error: function(error){
          console.log(JSON.stringify(error))
        }
      }) 
    }

function jsonToFormattedText(obj, indent = 0) {
  let result = "";
  const padding = "  ".repeat(indent); // 2-space indentation

  if (Array.isArray(obj)) {
    obj.forEach((item, index) => {
      result += `${padding}[${index + 1}]:\n`;
      result += jsonToFormattedText(item, indent + 1);
    });
  } else if (typeof obj === "object" && obj !== null) {
    Object.keys(obj).forEach(key => {
      let value = obj[key];
      if (typeof value === "object" && value !== null) {
        result += `${padding}${key}:\n`;
        result += jsonToFormattedText(value, indent + 1);
      } else {
        result += `${padding}${key}: ${value}\n`;
      }
    });
  } else {
    result += `${padding}${obj}\n`;
  }

  return result;
}


function transformJson(tbox) {
  const input = document.getElementById(tbox).value;
  const output = document.getElementById('output');

  try {
    const jsonObj = JSON.parse(input);
    const formattedText = jsonToFormattedText(jsonObj);
    output.textContent = formattedText ;
  }
   catch (e) {
    output.textContent = '❌ Invalid JSON. Please check your input.';
  }
}
